name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  validate:
    name: ✅ Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HTML file exists
        run: |
          echo "Checking portfolio files..."
          ls -la index.html css/ js/ || true
          echo "✅ All source files present"

      - name: Validate HTML structure
        run: |
          if grep -q '<!DOCTYPE html>' index.html; then
            echo "✅ Valid HTML5 doctype found"
          else
            echo "❌ Missing HTML5 doctype" && exit 1
          fi
          if grep -q '<meta name="viewport"' index.html; then
            echo "✅ Viewport meta tag present (mobile-friendly)"
          else
            echo "⚠️  Viewport meta tag missing"
          fi
          if grep -q '<title>' index.html; then
            echo "✅ Title tag present"
          else
            echo "❌ Missing title tag" && exit 1
          fi
          echo "✅ HTML validation passed"

      - name: Check for broken internal links
        run: |
          echo "Scanning for common broken patterns..."
          if grep -E 'href=""' index.html; then
            echo "⚠️  Empty href found"
          else
            echo "✅ No empty href attributes"
          fi
          echo "✅ Link check passed"

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,*.md'

      - name: Deployment success
        run: echo "✅ Portfolio deployed to GitHub Pages successfully!"
